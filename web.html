<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>גל עיני Web - חיפוש צפנים בתורה</title>
  <meta name="description" content="גרסת Web ראשונה של גל עיני: חיפוש ראשית ומשניות בדילוגים בתורה ישירות בדפדפן.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="web-app.css">
</head>
<body class="web-app-page">
  <header class="topbar app-topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">גע</span>
      <div>
        <strong>גל עיני Web</strong>
          <span>W011 | ספריית הצפנים שלי</span>
      </div>
    </div>
    <nav aria-label="ניווט">
      <a href="index.html">ראשי</a>
      <a href="examples.html">צפנים לדוגמה</a>
      <a href="index.html#download">הורדת Windows</a>
      <a id="editionSwitch" href="web.html?edition=free">עבור לחינמית</a>
    </nav>
  </header>

  <main class="web-shell desktop-like" data-app-version="W011">
    <section class="app-command-bar" aria-label="סרגל מצב">
      <div class="app-version">גל עיני Web W011</div>
      <div id="editionBadge" class="edition-badge">מקצועית | בטא פתוחה</div>
      <div class="app-current-skip">טבלה בדילוג</div>
      <div class="app-blessing">בסיעתא דשמיא</div>
      <div class="status-row compact-status" aria-live="polite">
        <progress id="searchProgress" max="100" value="0"></progress>
        <span id="statusText">טוען את טקסט התורה...</span>
      </div>
    </section>

    <section class="search-dock" aria-label="חיפוש">
      <form id="searchForm" class="search-panel">
        <label class="primary-field">
          <span>ראשית</span>
          <input id="primaryInput" name="primary" autocomplete="off" placeholder="לדוגמה: משיח">
        </label>
        <label class="secondary-field">
          <span>משניות</span>
          <textarea id="secondaryInput" name="secondary" rows="2" placeholder="לדוגמה: ישראל גאולה !תורה"></textarea>
        </label>
        <label>
          <span>דילוג מ־</span>
          <input id="skipFromInput" name="skipFrom" type="number" value="1" min="1" max="5000">
        </label>
        <label>
          <span>עד</span>
          <input id="skipToInput" name="skipTo" type="number" value="400" min="1" max="5000">
        </label>
        <label>
          <span>מינ' משניות</span>
          <input id="minSecondaryInput" name="minSecondary" type="number" value="1" min="0" max="20">
        </label>
        <div class="search-actions">
          <button id="searchButton" class="button primary" type="submit">חפש</button>
          <button id="secondaryScanButton" class="button secondary scan-secondary pro-only" type="button" title="סרוק את המשניות הנוכחיות בכל הראשיות שכבר נמצאו, ללא חיפוש ראשיות חוזר">סרוק משניות</button>
          <button id="stopButton" class="button secondary" type="button" disabled>עצור</button>
          <button id="clearButton" class="button secondary" type="button">נקה</button>
          <button id="openProjectButton" class="button secondary" type="button">פתח צופן</button>
          <button id="saveProjectButton" class="button secondary save-project pro-only" type="button" title="שמור את השדות ואת כל הממצאים לקובץ צופן">שמור צופן</button>
          <button id="libraryButton" class="button secondary library-button pro-only" type="button" title="פתח את ספריית הצפנים השמורים בדפדפן">הצפנים שלי</button>
          <button id="printButton" class="button secondary pro-only" type="button">הדפס</button>
          <input id="projectFileInput" type="file" accept=".json,.gal_einai.json,application/json" hidden>
        </div>
      </form>
    </section>

    <section class="workspace">
      <aside class="results-panel" aria-label="טבלת ממצאים">
        <div class="panel-head">
          <h2>טבלת ממצאים</h2>
          <span id="resultCount">0</span>
        </div>
        <div id="resultSummary" class="result-summary">לא בוצע חיפוש.</div>
        <div class="result-table-wrap">
          <table class="result-table">
            <thead id="resultsHead"></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </aside>

      <section class="torah-panel" aria-label="תצוגת התורה">
        <div class="panel-head torah-head">
          <h2 id="displayTitle">תצוגת התורה</h2>
          <div class="display-controls">
            <button id="prevResultButton" type="button" title="ממצא קודם">‹</button>
            <button id="nextResultButton" type="button" title="ממצא הבא">›</button>
            <button id="zoomOutButton" type="button" title="הקטן אותיות">A−</button>
            <button id="zoomInButton" type="button" title="הגדל אותיות">A+</button>
          </div>
        </div>
        <div id="topWords" class="top-words"></div>
        <div id="torahGrid" class="torah-grid" tabindex="0" aria-label="אותיות התורה סביב הממצא"></div>
      </section>
    </section>
  </main>

  <template id="emptyResultsTemplate">
    <tr><td colspan="5">אין ממצאים להצגה.</td></tr>
  </template>

  <dialog id="libraryDialog" class="library-dialog pro-only" aria-labelledby="libraryTitle">
    <div class="library-head">
      <div>
        <h2 id="libraryTitle">הצפנים שלי</h2>
        <span id="libraryCount">0 מתוך 20 צפנים</span>
      </div>
      <button id="closeLibraryButton" class="icon-button" type="button" aria-label="סגור" title="סגור">×</button>
    </div>
    <form id="librarySaveForm" class="library-save-row">
      <label>
        <span>שם הצופן</span>
        <input id="libraryNameInput" maxlength="80" autocomplete="off" placeholder="לדוגמה: אטום פצצה אירן">
      </label>
      <button class="button primary" type="submit">שמור בספרייה</button>
    </form>
    <div id="libraryList" class="library-list" aria-live="polite"></div>
    <p class="library-note">הצפנים נשמרים בדפדפן הזה בלבד. שמירה בענן תתווסף בהמשך.</p>
  </dialog>

  <script src="web-app.js"></script>
</body>
</html>
